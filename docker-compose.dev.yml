# FraudNet 2.0 — local data plane.
#
# Brings up the full set of dependencies a service needs to run end-to-end
# against real infrastructure (no mocks). Mirrors the production topology;
# does NOT mirror production scale or HA. Intended for engineer laptops + the
# always-on dev cluster only.
#
# Bring-up:    make infra-up
# Tear-down:   make infra-down  (keeps volumes)
# Wipe:        make infra-nuke  (destroys local data)

name: fraudnet-dev

x-restart: &restart
  restart: unless-stopped

# Shared dev-image build + env for all 13 application services. Production
# images are per-service distroless (services/*/Dockerfile); the dev image
# (Dockerfile.dev) keeps uv + workspace metadata so bind-mounted source runs
# `uv run` without rebuilding on every code change.
x-app-defaults: &app-defaults
  <<: *restart
  build:
    context: .
    dockerfile: Dockerfile.dev
  image: fraudnet/dev:latest
  pull_policy: never
  networks: [fraudnet]
  volumes:
    - ./packages:/workspace/packages
    - ./services:/workspace/services
    - ./scripts:/workspace/scripts:ro

x-app-env: &app-env
  FRAUDNET_ENV: dev
  LOG_LEVEL: INFO
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  SCHEMA_REGISTRY_URL: http://schema-registry:8081
  MEMGRAPH_URL: bolt://memgraph:7687
  AEROSPIKE_HOSTS: aerospike:3000
  POSTGRES_DSN: postgres://fraudnet:fraudnet_dev@postgres:5432/fraudnet
  AUDIT_POSTGRES_DSN: postgres://fraudnet:fraudnet_dev@postgres:5432/fraudnet_audit
  MODEL_REGISTRY_ENDPOINT: http://minio:9000
  MODEL_REGISTRY_BUCKET: fraudnet-models
  MODEL_REGISTRY_ACCESS_KEY: fraudnet
  MODEL_REGISTRY_SECRET_KEY: fraudnet_dev_minio
  JWT_ISSUER: http://keycloak:8080/realms/fraudnet
  JWKS_URL: http://keycloak:8080/realms/fraudnet/protocol/openid-connect/certs
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  PYTHONPATH: /workspace

networks:
  fraudnet:
    name: fraudnet-dev

volumes:
  postgres-data:
  memgraph-data:
  memgraph-log:
  aerospike-data:
  kafka-data:
  schema-registry-data:
  minio-data:
  redis-data:
  keycloak-data:

services:
  # --------------------------------------------------------------------------
  # Postgres + TimescaleDB — relational state, alerts, takedowns, audit log,
  # users, tenants, model registry. (CLAUDE.md §6.1)
  # --------------------------------------------------------------------------
  postgres:
    <<: *restart
    image: timescale/timescaledb:2.17.2-pg16
    container_name: fraudnet-postgres
    networks: [fraudnet]
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: fraudnet
      POSTGRES_USER: fraudnet
      POSTGRES_PASSWORD: fraudnet_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c shared_preload_libraries=timescaledb
        -c max_connections=200
        -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudnet -d fraudnet"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --------------------------------------------------------------------------
  # Memgraph — production graph database. In-memory. Cypher-compatible.
  # (CLAUDE.md §6.2, ADR 0002)
  # --------------------------------------------------------------------------
  memgraph:
    <<: *restart
    image: memgraph/memgraph:2.20.1
    container_name: fraudnet-memgraph
    networks: [fraudnet]
    ports:
      - "7687:7687"   # Bolt
      - "7444:7444"   # WebSocket logs
    # Memgraph Lab UI is a separate image (memgraph/lab); add to compose if you
    # need a browser UI for graph exploration locally.
    environment:
      MEMGRAPH: "--log-level=WARNING --also-log-to-stderr=true"
    volumes:
      - memgraph-data:/var/lib/memgraph
      - memgraph-log:/var/log/memgraph
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'RETURN 1;' | mgconsole --host=127.0.0.1 --port=7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Aerospike — in-memory feature store for the inline tier (Tier 1).
  # Sub-millisecond p99 reads. (CLAUDE.md §6.4)
  # --------------------------------------------------------------------------
  aerospike:
    # Community edition for dev; production uses Enterprise (XDR replication).
    <<: *restart
    image: aerospike/aerospike-server:7.2.0.1
    container_name: fraudnet-aerospike
    networks: [fraudnet]
    ports:
      - "3010:3000"   # client port (mapped to avoid local 3000/3001 collisions)
    command: ["--config-file", "/etc/aerospike/aerospike.conf"]
    volumes:
      - aerospike-data:/opt/aerospike/data
      - ./infra/aerospike/aerospike.conf:/etc/aerospike/aerospike.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "asinfo -v 'status' | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # --------------------------------------------------------------------------
  # Kafka (KRaft mode — no ZooKeeper) — the event spine. (CLAUDE.md §6.3)
  # Single broker for dev; production runs Confluent Platform / Strimzi 3-broker
  # minimum.
  # --------------------------------------------------------------------------
  kafka:
    <<: *restart
    image: confluentinc/cp-kafka:7.7.1
    container_name: fraudnet-kafka
    networks: [fraudnet]
    ports:
      - "9092:9092"   # external client
      - "9101:9101"   # JMX
    environment:
      CLUSTER_ID: "fraudnet-dev-cluster-000"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # all topics declared in infra/kafka-topics
      KAFKA_LOG_RETENTION_HOURS: 168              # 7d default; overridden per-topic
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  schema-registry:
    <<: *restart
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: fraudnet-schema-registry
    networks: [fraudnet]
    ports: ["8081:8081"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: backward
    volumes:
      - schema-registry-data:/var/lib/schema-registry
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Apache Flink — stream processing for stream-features and stream-graph.
  # SessionCluster for dev; production uses Flink Kubernetes Operator.
  # --------------------------------------------------------------------------
  flink-jobmanager:
    <<: *restart
    image: flink:1.20.0-scala_2.12-java17
    container_name: fraudnet-flink-jm
    networks: [fraudnet]
    ports: ["8082:8081"]    # Flink UI (8081 is taken by schema-registry)
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        execution.checkpointing.interval: 30s
    volumes:
      - ./infra/flink-jobs:/opt/flink/usrlib:ro

  flink-taskmanager:
    <<: *restart
    image: flink:1.20.0-scala_2.12-java17
    container_name: fraudnet-flink-tm
    networks: [fraudnet]
    depends_on: [flink-jobmanager]
    command: taskmanager
    deploy:
      replicas: 1
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage for the lakehouse. Iceberg tables
  # land here. Trino queries on top in production. (CLAUDE.md §6.5)
  # --------------------------------------------------------------------------
  minio:
    <<: *restart
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: fraudnet-minio
    networks: [fraudnet]
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    environment:
      MINIO_ROOT_USER: fraudnet
      MINIO_ROOT_PASSWORD: fraudnet_dev_minio
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:RELEASE.2024-11-05T11-29-45Z
    container_name: fraudnet-minio-bootstrap
    networks: [fraudnet]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set fraudnet http://minio:9000 fraudnet fraudnet_dev_minio &&
      mc mb -p fraudnet/fraudnet-lake || true &&
      mc mb -p fraudnet/fraudnet-models || true &&
      mc mb -p fraudnet/fraudnet-evidence || true &&
      mc mb -p fraudnet/fraudnet-audit-archive || true &&
      echo 'minio buckets ready'
      "

  # --------------------------------------------------------------------------
  # Redis — short-term cache (rate-limit counters, session state, idempotency
  # keys). Aerospike is the feature store; Redis is the everywhere-else cache.
  # --------------------------------------------------------------------------
  redis:
    <<: *restart
    image: redis:7.4-alpine
    container_name: fraudnet-redis
    networks: [fraudnet]
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------------------------------------------------------------------
  # Keycloak — service-to-service identity, NOC SSO bridge. (CLAUDE.md §7.1)
  # --------------------------------------------------------------------------
  keycloak:
    <<: *restart
    image: quay.io/keycloak/keycloak:26.0.4
    container_name: fraudnet-keycloak
    networks: [fraudnet]
    ports: ["8090:8080"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin_dev
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    volumes:
      - keycloak-data:/opt/keycloak/data
    command: ["start-dev", "--import-realm"]
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nhost: localhost\\r\\n\\r\\n' >&3 && timeout 1 cat <&3 | grep -q 'UP' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # --------------------------------------------------------------------------
  # Observability backends. Optional in dev — comment out if low on resources.
  # --------------------------------------------------------------------------
  otel-collector:
    <<: *restart
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: fraudnet-otel
    networks: [fraudnet]
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/otel/config.yaml:/etc/otel/config.yaml:ro

  prometheus:
    <<: *restart
    image: prom/prometheus:v3.0.0
    container_name: fraudnet-prometheus
    networks: [fraudnet]
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yaml:/etc/prometheus/alerts.yaml:ro

  grafana:
    <<: *restart
    image: grafana/grafana:11.3.1
    container_name: fraudnet-grafana
    networks: [fraudnet]
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro

  # ============================================================================
  # Application services (Phase 1).
  #
  # All 13 services share the dev image (Dockerfile.dev) and bind-mount their
  # source for hot-reload. Production builds use per-service distroless images
  # under services/*/Dockerfile.
  #
  # FastAPI services run uvicorn with --reload. Stream consumers and ingest
  # services run as plain modules; their FastAPI side-cars expose /health and
  # /metrics on the dev port. Code changes restart the watcher only for the
  # FastAPI surface; consumer loops require a manual `docker compose restart
  # <svc>` (acceptable for dev — the loops are short).
  #
  # Topology dependencies (kafka, postgres, memgraph, aerospike, redis) are
  # health-gated. db-migrate and kafka-init must succeed before app services
  # come online.
  # ============================================================================

  # ---- Ingestion services (Layer 1) -----------------------------------------

  ingest-momo:
    <<: *app-defaults
    container_name: fraudnet-ingest-momo
    ports: ["8100:8100"]
    environment:
      <<: *app-env
      REDIS_URL: redis://redis:6379/0
      INGEST_MOMO_HOST: 0.0.0.0
      INGEST_MOMO_PORT: "8100"
      MOMO_WEBHOOK_SHARED_SECRET: dev-momo-secret
    command: >
      uv run --package ingest-momo uvicorn ingest_momo.main:app
      --host 0.0.0.0 --port 8100 --reload --reload-dir /workspace/services/ingest-momo
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8100/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  ingest-voice:
    <<: *app-defaults
    container_name: fraudnet-ingest-voice
    ports: ["8101:8101"]
    environment:
      <<: *app-env
      REDIS_URL: redis://redis:6379/1
      INGEST_VOICE_HOST: 0.0.0.0
      INGEST_VOICE_PORT: "8101"
      VOICE_WEBHOOK_SHARED_SECRET: dev-voice-secret
      VOICE_VENDOR_ID: dev-vendor
    command: >
      uv run --package ingest-voice uvicorn ingest_voice.main:app
      --host 0.0.0.0 --port 8101 --reload --reload-dir /workspace/services/ingest-voice
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8101/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  ingest-sms:
    <<: *app-defaults
    container_name: fraudnet-ingest-sms
    ports: ["8102:8102"]
    environment:
      <<: *app-env
      REDIS_URL: redis://redis:6379/2
      INGEST_SMS_HOST: 0.0.0.0
      INGEST_SMS_PORT: "8102"
      SMS_WEBHOOK_SHARED_SECRET: dev-sms-secret
      SMS_SMSC_ID: dev-smsc
      SMS_ALLOW_BODY_CAPTURE: "true"
    command: >
      uv run --package ingest-sms uvicorn ingest_sms.main:app
      --host 0.0.0.0 --port 8102 --reload --reload-dir /workspace/services/ingest-sms
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8102/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ---- Stream processing (Layer 2) ------------------------------------------
  # Pure-Python consumers in Phase 1 (DECISIONS.md D-002). Phase 2 promotes to
  # PyFlink on the Flink Kubernetes Operator.

  stream-features:
    <<: *app-defaults
    container_name: fraudnet-stream-features
    ports: ["8110:8110"]
    environment:
      <<: *app-env
      STREAM_FEATURES_HEALTH_HOST: 0.0.0.0
      STREAM_FEATURES_HEALTH_PORT: "8110"
      STREAM_FEATURES_GROUP: stream-features-dev
    command: uv run --package stream-features python -m stream_features
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      aerospike: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8110/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  stream-graph:
    <<: *app-defaults
    container_name: fraudnet-stream-graph
    ports: ["8111:8111"]
    environment:
      <<: *app-env
      STREAM_GRAPH_HEALTH_HOST: 0.0.0.0
      STREAM_GRAPH_HEALTH_PORT: "8111"
      STREAM_GRAPH_GROUP: stream-graph-dev
    command: uv run --package stream-graph python -m stream_graph
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      memgraph: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8111/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 40s

  # ---- Brain services (Layer 3) ---------------------------------------------

  brain-behavioural:
    <<: *app-defaults
    container_name: fraudnet-brain-behavioural
    ports: ["8300:8300"]
    environment:
      <<: *app-env
      BRAIN_BEHAVIOURAL_HOST: 0.0.0.0
      BRAIN_BEHAVIOURAL_PORT: "8300"
      BRAIN_BEHAVIOURAL_GROUP: brain-behavioural-dev
    command: >
      uv run --package brain-behavioural uvicorn brain_behavioural.main:app
      --host 0.0.0.0 --port 8300 --reload --reload-dir /workspace/services/brain-behavioural
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      aerospike: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8300/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  brain-content:
    <<: *app-defaults
    container_name: fraudnet-brain-content
    ports: ["8301:8301"]
    environment:
      <<: *app-env
      BRAIN_CONTENT_HOST: 0.0.0.0
      BRAIN_CONTENT_PORT: "8301"
      BRAIN_CONTENT_GROUP: brain-content-dev
    command: >
      uv run --package brain-content uvicorn brain_content.main:app
      --host 0.0.0.0 --port 8301 --reload --reload-dir /workspace/services/brain-content
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8301/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  brain-otp-guard:
    <<: *app-defaults
    container_name: fraudnet-brain-otp-guard
    ports: ["8311:8311"]
    environment:
      <<: *app-env
      BRAIN_OTP_HOST: 0.0.0.0
      BRAIN_OTP_PORT: "8311"
      BRAIN_OTP_GROUP: brain-otp-guard-dev
      BRAIN_OTP_REDIS_URL: redis://redis:6379/3
      BRAIN_OTP_BANK_SHORT_CODES: "MTN,ECOBANK,GCB,STANBIC,FBN,UBA,CALBANK,ZENITH,FIDELITY,ABSA,GTBANK"
    command: >
      uv run --package brain-otp-guard uvicorn brain_otp_guard.main:app
      --host 0.0.0.0 --port 8311 --reload --reload-dir /workspace/services/brain-otp-guard
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8311/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  brain-graph:
    <<: *app-defaults
    container_name: fraudnet-brain-graph
    ports: ["8302:8302"]
    environment:
      <<: *app-env
      BRAIN_GRAPH_HOST: 0.0.0.0
      BRAIN_GRAPH_PORT: "8302"
      BRAIN_GRAPH_BATCH_INTERVAL_S: "900"
    command: >
      uv run --package brain-graph uvicorn brain_graph.main:app
      --host 0.0.0.0 --port 8302 --reload --reload-dir /workspace/services/brain-graph
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      memgraph: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8302/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ---- Decisions and actuators (Layer 4) ------------------------------------

  decisions:
    <<: *app-defaults
    container_name: fraudnet-decisions
    ports: ["8200:8200"]
    environment:
      <<: *app-env
      DECISIONS_HOST: 0.0.0.0
      DECISIONS_PORT: "8200"
      DECISIONS_GROUP: decisions-dev
      REDIS_URL: redis://redis:6379/3
      DECISIONS_POLICY_DIR: /workspace/services/decisions/policies
    command: >
      uv run --package decisions uvicorn decisions.main:app
      --host 0.0.0.0 --port 8200 --reload --reload-dir /workspace/services/decisions
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8200/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  action-tier1:
    <<: *app-defaults
    container_name: fraudnet-action-tier1
    ports: ["8201:8201"]
    environment:
      <<: *app-env
      ACTION_TIER1_HOST: 0.0.0.0
      ACTION_TIER1_PORT: "8201"
      ACTION_TIER1_GROUP: action-tier1-dev
      VOLTE_TAG_URL: http://localhost:9999/volte/tag
      URL_BLOCK_URL: http://localhost:9999/url/block
      SMS_BLOCK_URL: http://localhost:9999/sms/block
      MOMO_FRICTION_URL: http://localhost:9999/momo/friction
      OTP_HOLD_URL: ""
      OTP_HOLD_DURATION_S: "60"
      ACTUATOR_TOKEN: dev-actuator-token
    command: >
      uv run --package action-tier1 uvicorn action_tier1.main:app
      --host 0.0.0.0 --port 8201 --reload --reload-dir /workspace/services/action-tier1
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8201/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  action-tier2:
    <<: *app-defaults
    container_name: fraudnet-action-tier2
    ports: ["8202:8202"]
    environment:
      <<: *app-env
      ACTION_TIER2_HOST: 0.0.0.0
      ACTION_TIER2_PORT: "8202"
      ACTION_TIER2_GROUP: action-tier2-dev
      CUSTOMER_ALERT_URL: http://localhost:9999/alert
      DO_I_KNOW_YOU_URL: http://localhost:9999/dikyou
      MOMO_LIMIT_URL: http://localhost:9999/momo/limit
      SAFEGUARD_URL: http://localhost:9999/safeguard
      ACTUATOR_TOKEN: dev-actuator-token
    command: >
      uv run --package action-tier2 uvicorn action_tier2.main:app
      --host 0.0.0.0 --port 8202 --reload --reload-dir /workspace/services/action-tier2
      --reload-dir /workspace/packages
    depends_on:
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8202/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ---- Investigator and customer APIs ---------------------------------------

  api-noc:
    <<: *app-defaults
    container_name: fraudnet-api-noc
    ports: ["8010:8010"]
    environment:
      <<: *app-env
      API_NOC_HOST: 0.0.0.0
      API_NOC_PORT: "8010"
      JWT_AUDIENCE: fraudnet-noc
    command: >
      uv run --package api-noc uvicorn api_noc.main:app
      --host 0.0.0.0 --port 8010 --reload --reload-dir /workspace/services/api-noc
      --reload-dir /workspace/packages
    depends_on:
      db-migrate: { condition: service_completed_successfully }
      memgraph: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8010/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  api-customer:
    <<: *app-defaults
    container_name: fraudnet-api-customer
    ports: ["8011:8011"]
    environment:
      <<: *app-env
      API_CUSTOMER_HOST: 0.0.0.0
      API_CUSTOMER_PORT: "8011"
      REDIS_URL: redis://redis:6379/4
      CUSTOMER_SESSION_SECRET: dev-customer-session-secret-change-me
      OTP_SERVICE_URL: ""
    command: >
      uv run --package api-customer uvicorn api_customer.main:app
      --host 0.0.0.0 --port 8011 --reload --reload-dir /workspace/services/api-customer
      --reload-dir /workspace/packages
    depends_on:
      db-migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      kafka-init: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8011/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  compliance:
    <<: *app-defaults
    container_name: fraudnet-compliance
    ports: ["8400:8400"]
    environment:
      <<: *app-env
      COMPLIANCE_HOST: 0.0.0.0
      COMPLIANCE_PORT: "8400"
      COMPLIANCE_GROUP: compliance-dev
    command: >
      uv run --package compliance uvicorn compliance.main:app
      --host 0.0.0.0 --port 8400 --reload --reload-dir /workspace/services/compliance
      --reload-dir /workspace/packages
    depends_on:
      db-migrate: { condition: service_completed_successfully }
      kafka-init: { condition: service_completed_successfully }
      schema-registry: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8400/health/live', timeout=2).status==200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ============================================================================
  # One-shot bootstrappers — exit 0 once their job is done.
  # App services depend on these via condition: service_completed_successfully.
  # ============================================================================

  kafka-init:
    image: fraudnet/dev:latest
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fraudnet-kafka-init
    networks: [fraudnet]
    depends_on:
      kafka: { condition: service_healthy }
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      TOPICS_FILE: /workspace/infra/kafka-topics/topics.yaml
    volumes:
      - ./infra/kafka-topics:/workspace/infra/kafka-topics:ro
      - ./scripts:/workspace/scripts:ro
    command: uv run python /workspace/scripts/create_topics.py
    restart: "no"

  db-migrate:
    image: fraudnet/dev:latest
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fraudnet-db-migrate
    networks: [fraudnet]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: fraudnet
      POSTGRES_PASSWORD: fraudnet_dev
      POSTGRES_DB: fraudnet
      AUDIT_DB: fraudnet_audit
    volumes:
      - ./services:/workspace/services:ro
      - ./scripts:/workspace/scripts:ro
    entrypoint: ["/bin/bash", "/workspace/scripts/run_migrations.sh"]
    restart: "no"
