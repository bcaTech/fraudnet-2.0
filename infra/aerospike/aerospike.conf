# Dev Aerospike config — single node, in-memory, fraudnet namespace.
# Production deployment uses Aerospike Enterprise with XDR replication and
# strong-consistency (sc) namespaces; do NOT lift this file into prod.

service {
  proto-fd-max 15000
}

logging {
  console {
    context any info
  }
}

network {
  service {
    address any
    port 3000
  }
  heartbeat {
    mode mesh
    address any
    port 3002
    interval 150
    timeout 10
  }
  fabric {
    address any
    port 3001
  }
  info {
    address any
    port 3003
  }
}

namespace fraudnet {
  replication-factor 1
  default-ttl 86400          # 24h — feature TTL aligns with longest window
  nsup-period 120
  storage-engine memory {
    data-size 2G             # in-memory; size budget for dev only
  }
}
