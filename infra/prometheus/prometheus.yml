global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: services
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:8000"   # api-public
          - "host.docker.internal:8010"   # api-noc
          - "host.docker.internal:8011"   # api-customer
          - "host.docker.internal:8100"   # ingest-momo
          - "host.docker.internal:8200"   # decisions
          - "host.docker.internal:8400"   # compliance
