[project]
name = "fraudnet-features"
version = "0.1.0"
description = "Aerospike client with FraudNet feature-store conventions (Tier 1)"
requires-python = ">=3.12"
dependencies = [
  "aerospike>=15.0",
  "fraudnet-schemas",
  "fraudnet-obs",
]

[tool.uv.sources]
fraudnet-schemas = { workspace = true }
fraudnet-obs = { workspace = true }

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]
