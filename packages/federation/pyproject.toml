[project]
name = "fraudnet-federation"
version = "0.1.0"
description = "Cross-opco federated graph protocol — PII stays local, only hashed identifiers cross"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28",
  "fastapi>=0.115",
  "fraudnet-schemas",
  "fraudnet-obs",
  "fraudnet-graph",
]

[tool.uv.sources]
fraudnet-schemas = { workspace = true }
fraudnet-obs = { workspace = true }
fraudnet-graph = { workspace = true }

[dependency-groups]
dev = ["fraudnet-testing", "pytest-asyncio>=0.24"]

[tool.uv.sources.fraudnet-testing]
workspace = true

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]
