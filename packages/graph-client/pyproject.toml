[project]
name = "fraudnet-graph"
version = "0.1.0"
description = "Memgraph client wrapper with FraudNet semantics and tenant scoping"
requires-python = ">=3.12"
dependencies = [
  "neo4j>=5.27",     # Bolt-protocol driver, compatible with Memgraph
  "fraudnet-schemas",
  "fraudnet-obs",
  "fraudnet-audit",
]

[tool.uv.sources]
fraudnet-schemas = { workspace = true }
fraudnet-obs = { workspace = true }
fraudnet-audit = { workspace = true }

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]

[tool.hatch.build.targets.wheel.force-include]
"schema.cypher" = "fraudnet/graph/schema.cypher"
