[project]
name = "fraudnet-i18n"
version = "0.1.0"
description = "Multi-language alerts library — en/tw/ga/ee/dag/ha"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = ["fraudnet-testing"]

[tool.uv.sources.fraudnet-testing]
workspace = true

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]

[tool.hatch.build.targets.wheel.force-include]
"src/fraudnet/i18n/locales" = "fraudnet/i18n/locales"
