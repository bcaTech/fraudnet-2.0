[project]
name = "fraudnet-schemas"
version = "0.1.0"
description = "Canonical event types, error envelope, and Avro schemas for FraudNet 2.0"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.9,<3",
  "phonenumbers>=8.13",
  "pycountry>=24.6",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]

[tool.hatch.build.targets.wheel.force-include]
"avro" = "fraudnet/schemas/avro"
