[project]
name = "fraudnet-testing"
version = "0.1.0"
description = "Test fixtures, factories, and integration helpers"
requires-python = ">=3.12"
dependencies = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "testcontainers[kafka,postgres,redis]>=4.8",
  "fraudnet-schemas",
]

[tool.uv.sources]
fraudnet-schemas = { workspace = true }

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]
