[project]
name = "fraudnet-xai"
version = "0.1.0"
description = "Explainable AI layer — feature contributions + human-readable explanations for fraud signals"
requires-python = ">=3.12"
dependencies = [
  "fraudnet-schemas",
  "fraudnet-obs",
]

[tool.uv.sources]
fraudnet-schemas = { workspace = true }
fraudnet-obs = { workspace = true }

[dependency-groups]
dev = ["fraudnet-testing"]

[tool.uv.sources.fraudnet-testing]
workspace = true

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fraudnet"]
